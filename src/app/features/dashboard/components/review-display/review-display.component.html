<div class="review-card" *ngIf="review">
    <p-card styleClass="shadow-sm">
        <ng-template pTemplate="header">
            <div class="flex items-center justify-between p-4 border-b border-gray-100 dark:border-gray-700">
                <div class="flex items-center gap-3">
                    <p-avatar
                        [label]="review.guestName.charAt(0)"
                        shape="circle"
                        size="large"
                        styleClass="bg-primary text-white font-bold">
                    </p-avatar>
                    <div>
                        <h3 class="font-bold text-lg text-gray-900 dark:text-gray-100">{{ review.guestName }}</h3>
                        <p class="text-sm text-gray-500">{{ review.createdAt | date:'mediumDate' }}</p>
                    </div>
                </div>
                <div class="flex flex-col items-end">
                    <div class="flex items-center gap-2">
                        <span class="text-xl font-bold">{{ review.overallRating }}</span>
                        <p-rating [ngModel]="review.overallRating" [readonly]="true" [stars]="5"></p-rating>
                    </div>
                    <span class="text-xs text-gray-400">Reserva: {{ review.reservationCode }}</span>
                </div>
            </div>
        </ng-template>

        <div class="content space-y-6">
            <!-- Public Comment -->
            <div class="public-comment">
                <h4 class="font-semibold text-gray-700 dark:text-gray-300 mb-2">Comentário Público</h4>
                <p class="text-gray-600 dark:text-gray-400 italic bg-gray-50 dark:bg-gray-800 p-3 rounded-md">
                    "{{ review.publicComment }}"
                </p>
            </div>

            <!-- Private Feedback -->
            <div *ngIf="review.privateFeedback" class="private-feedback border-l-4 border-yellow-500 pl-4 py-1">
                <div class="flex items-center gap-2 mb-2">
                    <i class="pi pi-lock text-yellow-600"></i>
                    <h4 class="font-semibold text-gray-700 dark:text-gray-300">Feedback Privado</h4>
                    <p-tag value="Somente para você" severity="warn" [rounded]="true"></p-tag>
                </div>
                <p class="text-gray-600 dark:text-gray-400">
                    {{ review.privateFeedback }}
                </p>
            </div>

            <!-- Detailed Ratings Grid -->
            <div class="ratings-grid grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 bg-gray-50 dark:bg-gray-800/50 p-4 rounded-lg">
                <div class="rating-item flex justify-between items-center" *ngIf="review.cleanlinessRating">
                    <span class="text-sm">Limpeza</span>
                    <p-rating [ngModel]="review.cleanlinessRating" [readonly]="true" styleClass="text-sm"></p-rating>
                </div>
                <div class="rating-item flex justify-between items-center" *ngIf="review.accuracyRating">
                    <span class="text-sm">Veracidade</span>
                    <p-rating [ngModel]="review.accuracyRating" [readonly]="true" styleClass="text-sm"></p-rating>
                </div>
                <div class="rating-item flex justify-between items-center" *ngIf="review.checkinRating">
                    <span class="text-sm">Check-in</span>
                    <p-rating [ngModel]="review.checkinRating" [readonly]="true" styleClass="text-sm"></p-rating>
                </div>
                <div class="rating-item flex justify-between items-center" *ngIf="review.communicationRating">
                    <span class="text-sm">Comunicação</span>
                    <p-rating [ngModel]="review.communicationRating" [readonly]="true" styleClass="text-sm"></p-rating>
                </div>
                <div class="rating-item flex justify-between items-center" *ngIf="review.locationRating">
                    <span class="text-sm">Localização</span>
                    <p-rating [ngModel]="review.locationRating" [readonly]="true" styleClass="text-sm"></p-rating>
                </div>
                <div class="rating-item flex justify-between items-center" *ngIf="review.valueRating">
                    <span class="text-sm">Custo-benefício</span>
                    <p-rating [ngModel]="review.valueRating" [readonly]="true" styleClass="text-sm"></p-rating>
                </div>
            </div>
        </div>
    </p-card>
</div>
