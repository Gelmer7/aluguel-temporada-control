<form [formGroup]="form" class="grid grid-cols-1 md:grid-cols-2 gap-6">
  <!-- Preços Base -->
  <div class="col-span-1 md:col-span-2 border-b border-surface-200 dark:border-surface-700 pb-2">
    <h3 class="font-semibold text-primary">Preços Base</h3>
  </div>

  <div class="flex flex-col gap-2">
    <label for="base_night" class="font-medium">Preço por Noite (Dia Útil)</label>
    <p-inputNumber
      id="base_night"
      formControlName="base_night"
      mode="currency"
      currency="BRL"
      locale="pt-BR"
      class="w-full">
    </p-inputNumber>
  </div>

  <div class="flex flex-col gap-2">
    <label for="weekend_night" class="font-medium">Preço por Noite (Fim de Semana)</label>
    <p-inputNumber
      id="weekend_night"
      formControlName="weekend_night"
      mode="currency"
      currency="BRL"
      locale="pt-BR"
      class="w-full">
    </p-inputNumber>
  </div>

  <!-- Limites de Estadia -->
  <div class="col-span-1 md:col-span-2 border-b border-surface-200 dark:border-surface-700 pb-2 mt-4">
    <h3 class="font-semibold text-primary">Limites de Estadia</h3>
  </div>

  <div class="flex flex-col gap-2">
    <label for="min_nights" class="font-medium">Mínimo de Noites</label>
    <p-inputNumber id="min_nights" formControlName="min_nights" [showButtons]="true" [min]="1" class="w-full"></p-inputNumber>
  </div>

  <div class="flex flex-col gap-2">
    <label for="max_nights" class="font-medium">Máximo de Noites</label>
    <p-inputNumber id="max_nights" formControlName="max_nights" [showButtons]="true" [min]="1" class="w-full"></p-inputNumber>
  </div>

  <!-- Descontos por Duração -->
  <div class="col-span-1 md:col-span-2 border-b border-surface-200 dark:border-surface-700 pb-2 mt-4">
    <h3 class="font-semibold text-primary">Descontos por Duração</h3>
  </div>

  <div class="flex flex-col gap-2">
    <label for="weekly_7_nights" class="font-medium">Desconto Semanal (7+ noites) %</label>
    <p-inputNumber id="weekly_7_nights" formControlName="weekly_7_nights" suffix="%" [min]="0" [max]="100" class="w-full"></p-inputNumber>
  </div>

  <div class="flex flex-col gap-2">
    <label for="monthly_28_nights" class="font-medium">Desconto Mensal (28+ noites) %</label>
    <p-inputNumber id="monthly_28_nights" formControlName="monthly_28_nights" suffix="%" [min]="0" [max]="100" class="w-full"></p-inputNumber>
  </div>
</form>
