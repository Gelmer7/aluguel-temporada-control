<div class="min-h-screen flex flex-col">
  <header class="sticky top-0 z-50 bg-white shadow-sm flex justify-between items-center p-4 md:px-8">
    <div>
      <h3>🏡 Aluguel temporada Villa Flora</h3>
    </div>
    <div class="hidden md:flex gap-6 items-center">
      <button (click)="scrollToSection('propriedades')" class="text-surface-600 hover:text-surface-900 font-medium bg-transparent border-none cursor-pointer">Casas</button>
      <button (click)="scrollToSection('galeria')" class="text-surface-600 hover:text-surface-900 font-medium bg-transparent border-none cursor-pointer">Galeria</button>
      <button (click)="scrollToSection('disponibilidade')" class="text-surface-600 hover:text-surface-900 font-medium bg-transparent border-none cursor-pointer">Disponibilidade</button>
      <button (click)="scrollToSection('contato')" class="text-surface-600 hover:text-surface-900 font-medium bg-transparent border-none cursor-pointer">Contato</button>

      @if (user$ | async) {
        <p-button label="Dashboard" routerLink="/dashboard" styleClass="p-button-sm"></p-button>
      } @else {
        <p-button label="Login" routerLink="/auth/login" styleClass="p-button-outlined p-button-sm"></p-button>
      }
    </div>

    <!-- Mobile Menu Button -->
    <div class="md:hidden">
      <p-button icon="pi pi-bars" [text]="true" (onClick)="sidebarVisible = true"></p-button>
    </div>
  </header>

  <!-- Mobile Sidebar -->
  <p-drawer [(visible)]="sidebarVisible" position="right" styleClass="w-full sm:w-20rem">
    <div class="flex flex-col gap-4 p-4">
        <div class="text-2xl font-bold mb-4 text-primary">Menu</div>

        <button (click)="scrollToSection('propriedades')" class="text-left p-3 text-lg text-surface-600 hover:bg-surface-100 rounded-lg transition-colors border-none bg-transparent cursor-pointer">
            <i class="pi pi-home mr-2"></i> Casas
        </button>
        <button (click)="scrollToSection('galeria')" class="text-left p-3 text-lg text-surface-600 hover:bg-surface-100 rounded-lg transition-colors border-none bg-transparent cursor-pointer">
            <i class="pi pi-images mr-2"></i> Galeria
        </button>
        <button (click)="scrollToSection('disponibilidade')" class="text-left p-3 text-lg text-surface-600 hover:bg-surface-100 rounded-lg transition-colors border-none bg-transparent cursor-pointer">
            <i class="pi pi-calendar mr-2"></i> Disponibilidade
        </button>
        <button (click)="scrollToSection('contato')" class="text-left p-3 text-lg text-surface-600 hover:bg-surface-100 rounded-lg transition-colors border-none bg-transparent cursor-pointer">
            <i class="pi pi-envelope mr-2"></i> Contato
        </button>

        <div class="h-px bg-surface-200 my-2"></div>

        @if (user$ | async) {
            <p-button label="Ir para Dashboard" icon="pi pi-th-large" routerLink="/dashboard" styleClass="w-full" (onClick)="sidebarVisible = false"></p-button>
        } @else {
            <p-button label="Fazer Login" icon="pi pi-user" routerLink="/auth/login" styleClass="p-button-outlined w-full" (onClick)="sidebarVisible = false"></p-button>
        }
    </div>
  </p-drawer>

  <main class="flex-grow">
    <router-outlet></router-outlet>
  </main>

  <footer class="mt-auto py-8 text-center bg-gray-100">
    <p>&copy; {{ currentYear }} Sistema Aluguel temporada Villa Flora. All rights reserved.</p>
  </footer>
</div>
