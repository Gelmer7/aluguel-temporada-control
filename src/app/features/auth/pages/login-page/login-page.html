<div class="flex flex-col gap-6 w-full">
  <!-- Cabeçalho -->
  <div class="text-center">
    <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-2">
      {{ 'AUTH.LOGIN.TITLE' | translate }}
    </h2>
    <p class="text-gray-500 dark:text-gray-400">
      {{ 'AUTH.LOGIN.SUBTITLE' | translate }}
    </p>
  </div>

  <!-- Mensagem de Erro -->
  @if (errorMessage) {
    <p-message severity="error" [text]="errorMessage" styleClass="w-full"></p-message>
  }

  <!-- Formulário -->
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
    <!-- Email -->
    <div class="flex flex-col gap-2">
      <label for="email" class="font-medium text-gray-700 dark:text-gray-300">
        {{ 'AUTH.LOGIN.EMAIL_LABEL' | translate }}
      </label>
      <input 
        pInputText 
        id="email" 
        formControlName="email" 
        class="w-full" 
        [placeholder]="'ex: joao@email.com'" 
      />
    </div>

    <!-- Senha -->
    <div class="flex flex-col gap-2">
      <div class="flex justify-between items-center">
        <label for="password" class="font-medium text-gray-700 dark:text-gray-300">
          {{ 'AUTH.LOGIN.PASSWORD_LABEL' | translate }}
        </label>
        <a routerLink="/forgot-password" class="text-sm text-primary-600 hover:text-primary-700 dark:text-primary-400 no-underline hover:underline cursor-pointer">
          {{ 'AUTH.LOGIN.FORGOT_PASSWORD' | translate }}
        </a>
      </div>
      <p-password 
        id="password" 
        formControlName="password" 
        [feedback]="false" 
        [toggleMask]="true" 
        styleClass="w-full" 
        inputStyleClass="w-full"
        autocomplete="current-password"
      ></p-password>
    </div>

    <!-- Botão de Login -->
    <p-button 
      [label]="'AUTH.LOGIN.BUTTON' | translate" 
      type="submit" 
      [loading]="loading" 
      styleClass="w-full mt-2"
    ></p-button>
  </form>

  <!-- Separador -->
  <div class="relative flex items-center py-2">
    <div class="flex-grow border-t border-gray-300 dark:border-gray-700"></div>
    <span class="flex-shrink-0 mx-4 text-gray-400 text-sm">Ou</span>
    <div class="flex-grow border-t border-gray-300 dark:border-gray-700"></div>
  </div>

  <!-- Login com Google -->
  <p-button 
      [label]="'AUTH.LOGIN.GOOGLE_BUTTON' | translate" 
      icon="pi pi-google" 
      severity="secondary" 
      outlined="true" 
      styleClass="w-full hidden" 
      (onClick)="loginWithGoogle()"
    ></p-button>

  <!-- Link para Cadastro -->
  <div class="text-center mt-2 text-sm text-gray-600 dark:text-gray-400">
    {{ 'AUTH.LOGIN.NO_ACCOUNT' | translate }}
    <a routerLink="/auth/register" class="font-semibold text-primary-600 hover:text-primary-700 dark:text-primary-400 ml-1 no-underline hover:underline cursor-pointer">
      {{ 'AUTH.LOGIN.REGISTER_LINK' | translate }}
    </a>
  </div>
</div>
